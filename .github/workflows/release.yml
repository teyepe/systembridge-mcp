name: Release

on:
  push:
    branches:
      - main

permissions:
  contents: read

jobs:
  release:
    name: Release
    runs-on: ubuntu-latest
    permissions:
      contents: write
      issues: write
      pull-requests: write
      id-token: write
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 0
      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: "lts/*"
      - name: Install dependencies
        run: npm ci
      - name: Verify provenance of dependencies
        run: |
          set -euo pipefail
          max_attempts=3
          attempt=1
          last_output=""

          while [ "$attempt" -le "$max_attempts" ]; do
            echo "Provenance check attempt $attempt/$max_attempts"
            set +e
            output="$(npm audit signatures 2>&1)"
            status=$?
            set -e

            if [ "$status" -eq 0 ]; then
              echo "$output"
              exit 0
            fi

            last_output="$output"
            echo "$output"

            if [ "$attempt" -lt "$max_attempts" ]; then
              sleep_time=$((attempt * 5))
              echo "Retrying in ${sleep_time}s..."
              sleep "$sleep_time"
            fi

            attempt=$((attempt + 1))
          done

          if [[ "$last_output" == *"Operation timed out"* || "$last_output" == *"attestations"* || "$last_output" == *"E500"* ]]; then
            echo "::warning::Skipping provenance gate due to transient npm attestations endpoint failure."
            exit 0
          fi

          echo "::error::Provenance check failed for a non-transient reason."
          exit 1
      - name: Release
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          NPM_TOKEN: ${{ secrets.NPM_TOKEN }}
        run: npx semantic-release
